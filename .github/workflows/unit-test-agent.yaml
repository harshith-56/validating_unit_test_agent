name: AI Test Agent

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  generate-tests:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      # 1. Checkout repo with full history (REQUIRED)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Ensure base branch exists for diff
      - name: Fetch base branch
        run: git fetch origin "${{ github.base_ref }}" --depth=1

      # 3. Setup Python (for agent + python repos)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 4. Install Python deps (if present)
      - name: Install Python dependencies
        if: ${{ hashFiles('requirements.txt') != '' }}
        run: pip install -r requirements.txt

      # 5. Setup Node (for JS/TS repos)
      - name: Setup Node
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 6. Install Node deps
      - name: Install Node dependencies
        if: ${{ hashFiles('package-lock.json') != '' }}
        run: npm ci

      # 7. Run AI Test Agent (NEW VERSION)
      - name: Run AI Test Agent
        uses: harshith-56/UNIT-TEST-AGENT@v36
        with:
          llm_api_url: ${{ secrets.LLM_API_URL }}
          llm_api_key: ${{ secrets.LLM_API_KEY }}
          llm_model: ${{ secrets.LLM_MODEL }}

          # optional but recommended
          comment_on_pr: "true"
          fail_on_test_failure: "false"

      # 8. Debug generated files
      - name: Debug generated test files
        run: |
          echo "Listing tests directory"
          ls -R tests || true

      # 9. Clean Python cache files
      - name: Clean Python cache files
        run: |
          if [ -d "tests/ai_generated" ]; then
            find tests/ai_generated -name "__pycache__" -type d -exec rm -rf {} +
            find tests/ai_generated -name "*.pyc" -delete
          fi

      # 10. Commit generated tests
      - name: Commit generated tests
        run: |
          git config user.name "harshith-56"
          git config user.email "harshithreddy3737@gmail.com"
          
          if [ ! -d "tests/ai_generated" ]; then
            echo "tests/ai_generated directory not found, skipping commit"
            exit 0
          fi
          
          git add tests/ai_generated/
          
          if git diff --cached --quiet; then
            echo "No new tests generated"
            exit 0
          fi
          
          git commit -m "AI generated unit tests"
          git push origin HEAD:${{ github.head_ref }}
