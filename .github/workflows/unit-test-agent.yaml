name: AI Test Agent
on:
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  generate-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      # 1. Checkout repo with full history (REQUIRED)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Ensure base branch exists for diff
      - name: Fetch base branch
        run: git fetch origin "${{ github.base_ref }}" --depth=1

      # 3. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 4. Install Python deps from repo (if present)
      - name: Install Python dependencies
        if: ${{ hashFiles('requirements.txt') != '' }}
        run: pip install -r requirements.txt

      # 5. Install pytest and async plugin (always, regardless of requirements.txt)
      - name: Install Python test dependencies
        run: |
          pip install pytest pytest-asyncio --quiet

      # 6. Setup Node (for JS/TS repos)
      - name: Setup Node
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 7. Install Node deps from repo (if present)
      - name: Install Node dependencies
        if: ${{ hashFiles('package-lock.json') != '' }}
        run: npm ci

      # 8. Install JS/TS test dependencies
      # These are needed to run Jest + React Testing Library + jsdom
      # --legacy-peer-deps handles version conflicts gracefully
      - name: Install JS/TS test dependencies
        if: ${{ hashFiles('package.json') != '' }}
        run: |
          npm install --save-dev \
            jest \
            ts-jest \
            @types/jest \
            jest-environment-jsdom \
            @testing-library/react \
            @testing-library/jest-dom \
            @testing-library/user-event \
            @testing-library/dom \
            --legacy-peer-deps --quiet 2>/dev/null || true

      # 9. Ensure jest.config.js exists with correct settings for JSX + jsdom
      # Only writes the config if one does not already exist in the repo
      - name: Ensure jest config exists
        if: ${{ hashFiles('package.json') != '' }}
        run: |
          if [ ! -f "jest.config.js" ] && [ ! -f "jest.config.ts" ] && [ ! -f "jest.config.mjs" ]; then
            echo "No jest config found — writing default"
            cat > jest.config.js << 'EOF'
          module.exports = {
            preset: 'ts-jest',
            testEnvironment: 'jsdom',
            transform: {
              '^.+\\.(ts|tsx)$': 'ts-jest',
            },
            setupFilesAfterFramework: ['@testing-library/jest-dom'],
            testMatch: ['**/tests/ai_generated/**/*.test.ts', '**/tests/ai_generated/**/*.test.tsx'],
          }
          EOF
          else
            echo "jest config already exists — skipping"
          fi

      # 10. Ensure tsconfig.json has JSX support
      # Only patches if jsx is missing from compilerOptions
      - name: Ensure tsconfig has jsx support
        if: ${{ hashFiles('tsconfig.json') != '' }}
        run: |
          if ! grep -q '"jsx"' tsconfig.json; then
            echo "Adding jsx to tsconfig.json"
            node -e "
              const fs = require('fs');
              const tsconfig = JSON.parse(fs.readFileSync('tsconfig.json', 'utf8'));
              tsconfig.compilerOptions = tsconfig.compilerOptions || {};
              tsconfig.compilerOptions.jsx = 'react-jsx';
              tsconfig.compilerOptions.esModuleInterop = true;
              tsconfig.compilerOptions.allowSyntheticDefaultImports = true;
              fs.writeFileSync('tsconfig.json', JSON.stringify(tsconfig, null, 2));
            "
          else
            echo "tsconfig.json already has jsx — skipping"
          fi

      # 11. Ensure package.json has a test script pointing to jest
      # Only patches if test script is missing or set to something wrong
      - name: Ensure package.json test script
        if: ${{ hashFiles('package.json') != '' }}
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.scripts = pkg.scripts || {};
            if (!pkg.scripts.test || pkg.scripts.test === 'echo \"Error: no test specified\" && exit 1') {
              pkg.scripts.test = 'jest';
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
              console.log('Added test script to package.json');
            } else {
              console.log('test script already exists:', pkg.scripts.test);
            }
          "

      # 12. Run AI Test Agent
      - name: Run AI Test Agent
        uses: harshith-56/UNIT-TEST-AGENT@v38
        with:
          llm_api_url: ${{ secrets.LLM_API_URL }}
          llm_api_key: ${{ secrets.LLM_API_KEY }}
          llm_model: ${{ secrets.LLM_MODEL }}
          comment_on_pr: "true"

      # 13. Debug generated files
      - name: Debug generated test files
        run: |
          echo "=== tests/ai_generated contents ==="
          ls -R tests/ai_generated || echo "Directory not found"
          echo "=== mapping file ==="
          cat tests/ai_generated/.ai_test_mapping.json 2>/dev/null || echo "No mapping file"

      # 14. Clean Python cache files before commit
      - name: Clean Python cache files
        run: |
          if [ -d "tests/ai_generated" ]; then
            find tests/ai_generated -name "__pycache__" -type d -exec rm -rf {} +
            find tests/ai_generated -name "*.pyc" -delete
          fi

      # 15. Commit generated tests
      - name: Commit generated tests
        run: |
          git config user.name "harshith-56"
          git config user.email "harshithreddy3737@gmail.com"

          if [ ! -d "tests/ai_generated" ]; then
            echo "tests/ai_generated directory not found, skipping commit"
            exit 0
          fi

          git add tests/ai_generated/

          if git diff --cached --quiet; then
            echo "No new tests generated"
            exit 0
          fi

          git commit -m "AI generated unit tests"
          git push origin HEAD:${{ github.head_ref }}
